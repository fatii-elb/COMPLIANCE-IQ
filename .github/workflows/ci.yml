# Continuous Integration for the ComplianceIQ AI Service.
#
# Quality gates run on every push and pull request. The pipeline mirrors the
# local pre-commit + test workflow so "green locally" means "green in CI".
# Later phases extend this with integration tests (testcontainers), the
# evaluation job, and container/dependency scanning.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  quality:
    name: lint · types · architecture · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Black (format check)
        run: black --check src tests

      - name: mypy --strict (domain + application)
        run: mypy src/complianceiq/domain src/complianceiq/application

      - name: Import Linter (Clean Architecture contracts)
        run: lint-imports

      - name: Pytest with coverage gate
        run: pytest --cov=complianceiq --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  security-scan:
    name: dependency & secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install audit tooling
        run: pip install pip-audit

      - name: pip-audit (known-vulnerable dependencies)
        # Non-blocking for now: advisories are surfaced in logs. Hardened to a
        # blocking gate once the dependency set stabilises (tracked in RUNBOOK).
        run: pip-audit -r requirements.txt || true

  docker-build:
    name: build container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t complianceiq/ai-service:ci .
